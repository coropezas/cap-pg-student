name: Build & Deploy - PG Student - PRD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # mbt build ya ejecuta npm ci internamente via mta.yaml (before-all), por eso se omite aqui
      # - name: Install dependencies
      #   run: npm ci

      - name: Install MBT
        run: npm install -g mbt

      - name: Install CF CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8" | tar -zx
          sudo mv cf8 /usr/local/bin/cf

      - name: Install MTA plugin
        run: cf install-plugin multiapps -f

      - name: MBT Build
        run: mbt build

      - name: Upload MTAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtar-package
          path: mta_archives/*.mtar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: prd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MTAR artifact
        uses: actions/download-artifact@v4
        with:
          name: mtar-package
          path: mta_archives

      - name: Install CF CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8" | tar -zx
          sudo mv cf8 /usr/local/bin/cf

      - name: Install MTA plugin
        run: cf install-plugin multiapps -f

      - name: CF Login
        run: cf login -a ${{ vars.CF_API }} -u ${{ secrets.CF_USER }} -p '${{ secrets.CF_PASSWORD }}' -o "${{ vars.CF_ORG }}" -s ${{ vars.CF_SPACE }}

      - name: Deploy
        run: npm run deploy:prd

  release:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write

    steps:
      - name: Download MTAR artifact
        uses: actions/download-artifact@v4
        with:
          name: mtar-package
          path: mta_archives

      - name: Get version from MTAR
        id: version
        run: |
          FILE=$(ls mta_archives/*.mtar)
          VERSION=$(echo $FILE | grep -oP '\d+\.\d+\.\d+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
